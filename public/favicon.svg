<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="60%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </radialGradient>
    
    <!-- Neon Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Sphere -->
  <rect width="512" height="512" rx="128" fill="#020617" />
  <circle cx="256" cy="256" r="210" fill="url(#bgGrad)" opacity="0.8" />
  <circle cx="256" cy="256" r="190" fill="#020617" />

  <!-- Camera Body -->
  <g filter="url(#glow)">
    <!-- Flash/Top Element -->
    <path d="M192 160h128l16 32h64a32 32 0 0 1 32 32v160a32 32 0 0 1-32 32H112a32 32 0 0 1-32-32V224a32 32 0 0 1 32-32h64z" 
          fill="none" stroke="#38bdf8" stroke-width="20" stroke-linejoin="round" />
          
    <!-- Lens Outer Ring -->
    <circle cx="256" cy="288" r="70" fill="none" stroke="#a78bfa" stroke-width="16" />
    
    <!-- Lens Glass Reflection -->
    <circle cx="256" cy="288" r="40" fill="none" stroke="#f472b6" stroke-width="12" />
    
    <!-- Flash Dot -->
    <circle cx="360" cy="230" r="12" fill="#38bdf8" />
  </g>

  <!-- Lynx Ear Accents (Style detail) -->
  <path d="M112 192L80 130L144 145" fill="none" stroke="#38bdf8" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M400 192L432 130L368 145" fill="none" stroke="#38bdf8" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
</svg>